<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>心理帳戶計算機</title>
<meta name="description" content="心理帳戶計算機，七大帳戶分配與每月消費明細。" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#e7e1d6" />
<link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="計算機" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --desk:#e7e1d6;--paper:#fbf8f1;--paper-soft:#f4efe4;
  --ink:#2b2620;--ink-soft:#7c7361;--ink-faint:#a89e89;
  --dash:#cfc6b2;--line:#e6ddca;
  --acc:#2f6a4f;        /* 印章 / 強調色：深綠 */
  --acc-soft:#5d8a78;
  --warn:#a8651e;       /* 超支：深琥珀(更收斂) */
  --mono:"SFMono-Regular",Menlo,Consolas,"Courier New",monospace;
  --sh:0 14px 36px rgba(60,48,28,.2);
  --t:.25s cubic-bezier(.4,.1,.2,1);
  /* 六色（極淡，僅用於 4px 比例條） */
  --c-living:#3a352c;--c-invest:#4a4337;--c-edu:#665d4f;--c-fun:#857b69;--c-give:#a59a83;--c-saving:#bdb29c;
}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei","Segoe UI",system-ui,sans-serif;
  background:var(--desk);color:var(--ink);line-height:1.55;min-height:100svh;min-height:100dvh;
  display:flex;justify-content:center;align-items:flex-start;
  padding:calc(1.4rem + env(safe-area-inset-top)) calc(.8rem + env(safe-area-inset-right))
    calc(2.4rem + env(safe-area-inset-bottom)) calc(.8rem + env(safe-area-inset-left));
  -webkit-tap-highlight-color:transparent;
}
.mono{font-family:var(--mono)}
.ic{width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-.125em;flex:none}
.icon-defs{position:absolute;width:0;height:0;overflow:hidden}

.wrap{width:100%;max-width:430px;display:flex;flex-direction:column;gap:.95rem}

/* tabs */
.tabs{display:flex;gap:0;justify-content:center;background:var(--paper);border:1px solid var(--line);align-self:center;box-shadow:0 2px 6px rgba(60,48,28,.1)}
.tab{font-family:var(--mono);font-size:.78rem;font-weight:800;letter-spacing:.2em;color:var(--ink-soft);
  background:transparent;border:none;padding:.6rem 1.2rem;cursor:pointer;transition:var(--t)}
.tab.active{color:var(--paper);background:var(--ink)}
.tab:not(.active):hover{color:var(--ink)}

/* receipt paper（撕邊使用 mask 鋸齒） */
.receipt{position:relative;background:var(--paper);box-shadow:var(--sh);padding:1.6rem 1.5rem 1.7rem;
  --tear:12px;
  -webkit-mask:
    linear-gradient(135deg,transparent 6px,#000 6px) top left/12px 12px repeat-x,
    linear-gradient(225deg,transparent 6px,#000 6px) top right/12px 12px repeat-x,
    linear-gradient(45deg,transparent 6px,#000 6px) bottom left/12px 12px repeat-x,
    linear-gradient(-45deg,transparent 6px,#000 6px) bottom right/12px 12px repeat-x,
    linear-gradient(#000,#000);
  -webkit-mask-composite:source-over;
          mask:
    linear-gradient(135deg,transparent 6px,#000 6px) top left/12px 12px repeat-x,
    linear-gradient(225deg,transparent 6px,#000 6px) top right/12px 12px repeat-x,
    linear-gradient(45deg,transparent 6px,#000 6px) bottom left/12px 12px repeat-x,
    linear-gradient(-45deg,transparent 6px,#000 6px) bottom right/12px 12px repeat-x,
    linear-gradient(#000,#000);
}
.receipt::before{content:"";position:absolute;top:8px;left:8px;right:8px;bottom:8px;
  pointer-events:none;border-radius:1px;
  background:radial-gradient(ellipse at top,rgba(0,0,0,0) 70%,rgba(60,48,28,.04) 100%)}

.r-head{text-align:center;border-bottom:2px dashed var(--dash);padding-bottom:.85rem;margin-bottom:1rem}
.r-title{font-size:1.15rem;font-weight:800;letter-spacing:.3em;color:var(--ink)}
.r-sub{font-size:.7rem;color:var(--ink-faint);margin-top:.3rem;font-family:var(--mono);letter-spacing:.15em}
.r-sub b{color:var(--ink-soft);font-weight:700}

/* income row */
.income-row{display:flex;align-items:baseline;gap:.5rem}
.income-row .lbl{font-size:.92rem;font-weight:700;letter-spacing:.05em}
.income-row .dotleader{flex:1;height:1px;border-bottom:1px dotted var(--ink-faint);transform:translateY(-4px);margin:0 .3rem}
.income-field{display:flex;align-items:baseline;gap:.25rem;border-bottom:1.5px solid var(--ink);padding-bottom:1px;transition:border-color var(--t)}
.income-field:focus-within{border-color:var(--acc)}
.income-field .cur{font-family:var(--mono);font-size:.92rem;font-weight:800;color:var(--ink-faint)}
#income-input{width:120px;border:none;outline:none;background:transparent;text-align:right;
  font-family:var(--mono);font-size:1.42rem;font-weight:800;color:var(--ink);padding:0}
#income-input::placeholder{color:#cdc4b0}
#income-input::-webkit-outer-spin-button,#income-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
#income-input[type=number]{-moz-appearance:textfield}

/* 4px alloc bar */
.alloc-bar{display:flex;height:4px;border:1px solid var(--dash);margin:.85rem 0 1.15rem}
.alloc-seg{height:100%;transition:width .4s cubic-bezier(.34,1.4,.64,1)}

/* table header */
.thead{display:flex;align-items:baseline;font-family:var(--mono);font-size:.7rem;color:var(--ink-soft);
  letter-spacing:.2em;border-bottom:1px solid var(--dash);padding-bottom:.35rem;margin-bottom:.35rem}
.thead .c-no{width:24px}.thead .c-name{flex:1}.thead .c-pct{width:48px;text-align:right}.thead .c-amt{width:88px;text-align:right}

/* item rows */
.row{padding-top:.45rem}
.row .top{display:flex;align-items:baseline;font-family:var(--mono);font-size:.95rem;color:var(--ink);gap:8px}
.row .no{width:24px;color:var(--ink-faint)}
.row .dot{width:8px;height:8px;border-radius:50%;flex:none;display:inline-block;align-self:center;box-shadow:0 0 0 1px rgba(43,38,32,.12)}
.lb-head .name .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.45rem;vertical-align:.05em;box-shadow:0 0 0 1px rgba(43,38,32,.12)}
.row .name{flex:1;font-family:inherit;font-weight:700;display:flex;align-items:center;gap:.4rem;min-width:0;letter-spacing:.04em}
.row .pct{width:48px;text-align:right;color:var(--ink-soft);font-weight:700}
.row .amt{width:88px;text-align:right;font-weight:800}
.burn-tag{font-family:var(--mono);font-size:.55rem;font-weight:800;letter-spacing:.15em;color:var(--paper);background:var(--ink);padding:1px 6px}
.row .ctl{display:flex;align-items:center;gap:.55rem;margin-top:.35rem}
.pct-slider{-webkit-appearance:none;appearance:none;flex:1;height:2px;background:var(--ink);opacity:.25;cursor:pointer;outline:none;border-radius:0;
  background-image:linear-gradient(var(--ink),var(--ink));background-size:var(--slider-fill,50%) 100%;background-repeat:no-repeat;opacity:1}
.pct-slider::-webkit-slider-runnable-track{height:2px;background:rgba(43,38,32,.22)}
.pct-slider::-moz-range-track{height:2px;background:rgba(43,38,32,.22)}
.pct-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--paper);border:1.5px solid var(--ink);margin-top:-6px;cursor:pointer;transition:transform .15s}
.pct-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--paper);border:1.5px solid var(--ink);cursor:pointer}
.pct-slider:hover::-webkit-slider-thumb{transform:scale(1.2)}
.pct-slider:active::-webkit-slider-thumb{background:var(--ink)}
.pct-slider:focus-visible{outline:1px solid var(--acc);outline-offset:2px}
.pct-input{width:42px;background:var(--paper);border:1px solid var(--dash);border-radius:0;
  color:var(--ink);font-family:var(--mono);font-size:.78rem;font-weight:700;text-align:center;padding:3px 1px;outline:none;-moz-appearance:textfield}
.pct-input::-webkit-outer-spin-button,.pct-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.pct-input:focus{border-color:var(--ink)}
.row .goal{font-family:var(--mono);font-size:.62rem;color:var(--ink-faint);letter-spacing:.1em;margin-top:.15rem;text-align:right}
.row .goal.miss{color:var(--warn)}
.row .goal.ok{color:var(--acc)}

/* divider & totals */
.divider{border-top:2px dashed var(--dash);margin:1.1rem 0}
.total-line{display:flex;justify-content:space-between;align-items:baseline}
.total-line .lbl{font-size:1rem;font-weight:800;letter-spacing:.4em}
.total-line .val{font-family:var(--mono);font-size:1.08rem;font-weight:800;display:flex;align-items:baseline;gap:.55rem}
.pct-badge{font-family:var(--mono);font-size:.7rem;font-weight:800;letter-spacing:.1em;padding:2px 8px;color:var(--ink);border:1px solid var(--ink)}
.pct-badge.over{color:var(--warn);border-color:var(--warn)}
.pct-badge.under{color:var(--ink-soft);border-color:var(--dash)}

/* save block：印章 + SAVE */
.save-block{display:flex;justify-content:space-between;align-items:center;gap:.7rem;margin-top:1rem}
.stamp{flex:none;transform:rotate(-7deg);transition:transform .3s,opacity .3s}
.stamp.hidden{opacity:0;transform:rotate(-7deg) scale(.6)}
.month-save{display:flex;flex-direction:column;gap:.5rem;flex:1;align-items:flex-end}
#month-input{background:var(--paper-soft);border:1px solid var(--dash);border-radius:0;color:var(--ink);
  font-family:var(--mono);font-size:.85rem;font-weight:700;padding:.45rem .55rem;outline:none;color-scheme:light;width:100%;max-width:170px}
#month-input:focus{border-color:var(--ink)}
.btn-primary{font-family:var(--mono);font-size:.86rem;font-weight:800;letter-spacing:.3em;
  background:var(--ink);color:var(--paper);border:none;padding:.7rem 1.2rem;cursor:pointer;transition:var(--t);width:100%;max-width:170px}
.btn-primary:hover{background:#1c1813}
.btn-primary:active{transform:scale(.98)}

.barcode{text-align:center;margin-top:1.2rem}
.barcode .bars{font-family:var(--mono);font-size:1.35rem;letter-spacing:-1px;color:var(--ink);line-height:1;word-break:break-all}
.barcode .cap{font-family:var(--mono);font-size:.62rem;color:var(--ink-faint);letter-spacing:.3em;margin-top:.35rem}

.reset-wrap{display:flex;justify-content:center;margin-top:.15rem}
.btn-reset{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.76rem;font-weight:700;letter-spacing:.2em;
  color:var(--ink-soft);background:transparent;border:1px solid var(--line);padding:.55rem 1.3rem;border-radius:99px;cursor:pointer;transition:var(--t)}
.btn-reset:hover{color:var(--ink);border-color:var(--ink-soft)}

.view{display:none}.view.active{display:block}

/* ── 記帳明細 ── */
.records-head{display:grid;grid-template-columns:auto 1fr auto;column-gap:.6rem;row-gap:.5rem;align-items:center;margin-bottom:.85rem}
.records-head label{font-family:var(--mono);font-size:.72rem;font-weight:700;color:var(--ink-soft);letter-spacing:.15em}
#month-select{min-width:0;width:100%;background:var(--paper-soft);border:1px solid var(--dash);border-radius:0;color:var(--ink);
  font-family:var(--mono);font-size:.88rem;font-weight:700;padding:.5rem .6rem;outline:none;color-scheme:light}
.records-head .btn-ghost{grid-column:3;justify-self:stretch;justify-content:center}
.records-head .btn-danger{grid-column:3;justify-self:stretch;text-align:center}
@media (min-width:480px){
  .records-head{grid-template-columns:auto 1fr auto auto}
  .records-head .btn-ghost{grid-column:3;justify-self:auto}
  .records-head .btn-danger{grid-column:4;justify-self:auto}
}
.btn-danger{font-family:var(--mono);font-size:.7rem;font-weight:800;letter-spacing:.2em;color:var(--warn);
  background:transparent;border:1px solid var(--warn);padding:.5rem .85rem;cursor:pointer;transition:var(--t);white-space:nowrap}
.btn-danger:hover{background:#f5e8d8}
.btn-ghost{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:.7rem;font-weight:800;letter-spacing:.2em;color:var(--ink);
  background:var(--paper);border:1px solid var(--ink);padding:.5rem .85rem;cursor:pointer;transition:var(--t);white-space:nowrap}
.btn-ghost:hover{background:var(--ink);color:var(--paper)}
.btn-ghost .ic{font-size:.9rem}
.btn-ghost:disabled{opacity:.5;cursor:wait}
.summary{display:flex;justify-content:space-between;text-align:center;border-top:2px dashed var(--dash);border-bottom:2px dashed var(--dash);padding:.85rem 0;margin-bottom:.9rem;gap:.4rem}
.summary .cell{flex:1;min-width:0}
.summary .lbl{font-family:var(--mono);font-size:.65rem;color:var(--ink-soft);letter-spacing:.15em}
.summary .val{font-family:var(--mono);font-size:clamp(.92rem,3.6vw,1.1rem);font-weight:800;margin-top:.15rem;white-space:nowrap;color:var(--ink)}
.summary .cell.spent .val{color:var(--warn)}
.summary .cell.remain .val{color:var(--acc)}
.summary .cell.remain.neg .val{color:var(--warn)}

.ledger-block{padding:.55rem 0 .9rem;border-bottom:2px dashed var(--dash)}
.ledger-block:last-of-type{border-bottom:none}
.lb-head{display:flex;align-items:baseline;gap:.5rem;font-family:var(--mono);font-size:.78rem;color:var(--ink);letter-spacing:.1em}
.lb-head .name{font-family:inherit;font-weight:800;letter-spacing:.06em}
.lb-head .dotleader{flex:1;border-bottom:1px dotted var(--ink-faint);transform:translateY(-4px)}
.lb-head .budget{color:var(--ink-soft);font-weight:700}
.note-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:.45rem}
.note-tag{display:inline-flex;align-items:center;gap:3px;font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;font-size:.72rem;font-weight:600;color:var(--ink-soft);
  background:var(--paper-soft);border:1px solid var(--dash);border-radius:99px;padding:3px 9px;cursor:pointer;transition:var(--t);white-space:nowrap}
.note-tag:hover{color:var(--ink);border-color:var(--ink-soft);background:#fff}
.note-tag.custom{border-style:dashed}
.note-del{flex:none;width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;
  background:transparent;border:none;color:var(--ink-faint);font-size:.85rem;line-height:1;cursor:pointer;padding:0;border-radius:50%}
.note-del:hover{color:var(--warn);background:#fbe7e2}
.note-add{font-family:var(--mono);font-size:.7rem;font-weight:700;letter-spacing:.05em;color:var(--ink-soft);
  background:transparent;border:1px dashed var(--dash);border-radius:99px;padding:3px 9px;cursor:pointer;transition:var(--t)}
.note-add:hover{color:var(--ink);border-color:var(--ink-soft);border-style:solid}
.expense-list{list-style:none;display:flex;flex-direction:column;margin-top:.45rem;margin-bottom:.45rem}
.expense-row{display:flex;gap:.6rem;align-items:baseline;font-family:var(--mono);font-size:.82rem;color:var(--ink);padding:.2rem 0}
.expense-row .ed{color:var(--ink-faint);width:46px;flex:none}
.expense-row .en{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;letter-spacing:.02em}
.expense-row .ea{width:80px;text-align:right;font-weight:700}
.expense-row .del{flex:none;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--ink-faint);font-size:1rem;border-radius:0;cursor:pointer;line-height:1;transition:var(--t)}
.expense-row .del:hover{color:var(--warn)}
.expense-empty{font-family:var(--mono);font-size:.74rem;color:var(--ink-faint);text-align:center;padding:.3rem 0;letter-spacing:.1em}
.subtotal{display:flex;font-family:var(--mono);font-size:.82rem;font-weight:800;justify-content:flex-end;gap:.6rem;border-top:1px dotted var(--ink-faint);padding-top:.35rem}
.subtotal .lbl{color:var(--ink-soft);letter-spacing:.2em}
.subtotal .val{width:80px;text-align:right;color:var(--ink)}
.subtotal.remain .val{color:var(--acc)}
.subtotal.remain.neg .val{color:var(--warn)}
.expense-form{display:flex;gap:5px;margin-top:.4rem}
.expense-form input{background:var(--paper-soft);border:1px solid var(--dash);border-radius:0;color:var(--ink);
  font-family:var(--mono);font-size:16px;padding:7px 9px;outline:none;min-width:0}
.expense-form .exp-name{flex:1;font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif}
.expense-form .exp-amt{width:88px;-moz-appearance:textfield;text-align:right}
.expense-form .exp-amt::-webkit-outer-spin-button,.expense-form .exp-amt::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.expense-form input:focus{border-color:var(--ink)}
.expense-form .exp-add{flex:none;width:36px;border:none;background:var(--ink);color:var(--paper);font-size:1.1rem;font-weight:700;cursor:pointer;transition:var(--t)}
.expense-form .exp-add:hover{background:#1c1813}

.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--ink-soft)}
.empty-state .es-ic{font-size:2.2rem;color:var(--ink-faint)}
.empty-state p{font-size:.9rem;line-height:1.7;margin:.85rem 0 1.3rem;font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif}

.foot{text-align:center;font-family:var(--mono);font-size:.66rem;color:var(--ink-faint);letter-spacing:.2em;padding-top:.2rem}
.install-btn{display:none;align-items:center;gap:6px;margin:0 auto;font-family:var(--mono);font-size:.72rem;font-weight:700;letter-spacing:.15em;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);padding:.45rem .9rem;cursor:pointer}
.install-btn.show{display:inline-flex}
.install-tip{display:none;font-size:.78rem;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);padding:.7rem .9rem;text-align:center;line-height:1.65;font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif}
.install-tip.show{display:block}
.install-tip b{color:var(--ink)}

.toast{position:fixed;left:50%;bottom:calc(1.4rem + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:.82rem;font-weight:700;letter-spacing:.1em;
  padding:.7rem 1.2rem;box-shadow:var(--sh);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.update-banner{position:fixed;left:50%;bottom:calc(1.4rem + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:var(--paper);box-shadow:var(--sh);
  display:flex;align-items:center;gap:.6rem;padding:.65rem 1.15rem;border-radius:99px;
  font-family:var(--mono);font-size:.8rem;font-weight:700;letter-spacing:.1em;z-index:60;opacity:0;transition:opacity .3s,transform .3s;max-width:90vw}
.update-banner.show{opacity:1;transform:translateX(-50%) translateY(0)}
.dot-spin{width:11px;height:11px;border:2px solid var(--paper);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;flex:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
.pop{animation:pop .3s ease}

/* ── 匯出列印動畫浮層 ── */
.print-overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:max(8vh,46px) 1rem 1rem;background:rgba(43,38,32,0);transition:background .3s;overscroll-behavior:contain;cursor:pointer}
.print-overlay.show{background:rgba(43,38,32,.55)}
.po-stage{position:relative;display:flex;flex-direction:column;align-items:center;max-width:100%}
.po-printer{width:100%;height:36px;background:#3a352c;border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;position:relative;z-index:4;box-shadow:0 3px 8px rgba(0,0,0,.3)}
.po-slit{width:60%;height:5px;background:#16130f;border-radius:3px}
.po-led{position:absolute;left:14px;top:13px;width:9px;height:9px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc)}
.po-led.busy{animation:blink .5s steps(1) infinite}
.po-tag{position:absolute;right:14px;font-family:var(--mono);font-size:.5rem;letter-spacing:.18em;color:#b8b0a0}
.po-teeth{display:block;margin-top:-1px;position:relative;z-index:4;max-width:100%}
.po-feed{width:100%;height:0;overflow:hidden;position:relative;z-index:1;margin-top:-3px}

<svg class="icon-defs" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <symbol id="i-receipt" viewBox="0 0 24 24"><path d="M5 3.5h14v17l-2.3-1.4-2.3 1.4-2.4-1.4-2.4 1.4-2.3-1.4L5 20.5z"/><line x1="8.5" y1="8" x2="15.5" y2="8"/><line x1="8.5" y1="11.5" x2="15.5" y2="11.5"/><line x1="8.5" y1="15" x2="13" y2="15"/></symbol>
  <symbol id="i-list" viewBox="0 0 24 24"><line x1="4" y1="6.5" x2="20" y2="6.5"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17.5" x2="20" y2="17.5"/></symbol>

<div class="toast" id="toast"></div>

<script>
const ACCOUNTS=[
  { key:'living',  name:'生活',     percent:40, hex:'#5a7a9e', goal:{type:'max',v:30,text:'TARGET ≤ 30%'},
    notes:['🍔 食','👕 衣','🏠 住','🚗 行'] },
  { key:'startup', name:'創業',     percent:10, hex:'#9c8a4a',
    notes:['🧾 會計','📋 公司登記','💻 軟體','🛠 工具'] },
  { key:'invest',  name:'投資',     percent:10, hex:'#5e9078', goal:{type:'min',v:30,text:'TARGET ≥ 30%'},
    notes:['🎁 獎金','🍀 意外之財','🧧 中獎發票'] },
  { key:'edu',     name:'教育',     percent:10, hex:'#a48254',
    notes:['▶️ 線上課程','✏️ 文具','💻 3C 設備','🏃 運動'] },
  { key:'fun',     name:'玩樂',     percent:10, hex:'#b87593', burn:true,
    notes:['🖼 展覽','🍱 吃喝玩樂','🎬 電影','📺 Netflix'] },
  { key:'give',    name:'給予',     percent:10, hex:'#8478a8', burn:true,
    notes:['❤️ 孝親費','🧧 紅包','🎀 禮物','🤝 公益','🛡 保險','💼 繳稅'] },
  { key:'saving',  name:'長期儲蓄', percent:10, hex:'#6a9aa0',
    notes:['✈️ 出國旅遊','🛍 想要的東西'], custom:true },
];
const KEYS=ACCOUNTS.map(a=>a.key);
const percents={}; ACCOUNTS.forEach(a=>percents[a.key]=a.percent);

const $=id=>document.getElementById(id);
const incomeInput=$('income-input');
const fmt=v=>'NT$ '+Math.floor(Math.max(0,v)).toLocaleString('zh-TW');
const fmtNoCur=v=>Math.floor(Math.max(0,v)).toLocaleString('zh-TW');
const fmtSigned=v=>(v<0?'-':'')+'NT$ '+Math.abs(Math.round(v)).toLocaleString('zh-TW');
const pop=el=>{ if(!el)return; el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); };
const currentIncome=()=>Math.max(0,parseFloat(incomeInput.value)||0);

/* 再平衡：
   • 動「投資」以外的任一帳戶 → 差額由投資吸收，其餘帳戶不動
   • 動投資 → 剩餘平均分給 教育/玩樂/給予/長期儲蓄；生活與創業（FIXED）不變 */
const ABSORB='invest';
const SPLIT4=['edu','fun','give','saving'];
const FIXED=['living','startup'];
function roundToSum(keys,raw,target){
  const f={},fr=[];let used=0;
  keys.forEach(k=>{const x=Math.floor(raw[k]);f[k]=x;used+=x;fr.push([k,raw[k]-x]);});
  let left=target-used;fr.sort((a,b)=>b[1]-a[1]);
  for(let i=0;i<left&&i<fr.length;i++)f[fr[i][0]]++;
  keys.forEach(k=>percents[k]=f[k]);
}
function distributeEvenly(keys,total){ total=Math.max(0,Math.round(total)); const raw={}; keys.forEach(k=>raw[k]=total/keys.length); roundToSum(keys,raw,total); }
function setPercent(ck,v){
  v=Math.max(0,Math.min(100,Math.round(v)));
  if(ck===ABSORB){
    const fixedSum=FIXED.reduce((s,k)=>s+percents[k],0);
    const mx=100-fixedSum; v=Math.min(v,mx);
    percents[ABSORB]=v; distributeEvenly(SPLIT4,100-v-fixedSum);
  } else {
    const others=KEYS.filter(k=>k!==ck&&k!==ABSORB);
    const os=others.reduce((s,k)=>s+percents[k],0);
    v=Math.min(v,100-os);
    percents[ck]=v; percents[ABSORB]=100-v-os;
  }
}

function buildRows(){
  $('rows').innerHTML=ACCOUNTS.map((a,i)=>{
    const num=String(i+1).padStart(2,'0');
    const burn=a.burn?'<span class="burn-tag">花光</span>':'';
    const goal=a.goal?`<div class="goal" id="${a.key}-goal">${a.goal.text}</div>`:'';
    return `<div class="row" data-key="${a.key}">
      <div class="top">
        <span class="no">${num}</span>
        <span class="dot" style="background:${a.hex}"></span>
        <span class="name">${a.name}${burn}</span>
        <span class="pct" id="${a.key}-pct-label">${a.percent}%</span>
        <span class="amt" id="${a.key}-amount">0</span>
      </div>
      <div class="ctl">
        <input type="range" class="pct-slider" id="${a.key}-slider" min="0" max="100" step="1" value="${a.percent}" aria-label="${a.name}比例" style="--slider-fill:${a.percent}%" />
        <input type="number" class="pct-input" id="${a.key}-pct-input" min="0" max="100" value="${a.percent}" aria-label="${a.name}百分比" />
      </div>
      ${goal}
    </div>`;
  }).join('');
}
function buildAllocBar(){ $('alloc-bar').innerHTML=ACCOUNTS.map(a=>`<span class="alloc-seg" data-key="${a.key}" style="background:${a.hex}"></span>`).join(''); }

function updateRow(a,income){
  const pct=percents[a.key], amt=income*pct/100;
  $(`${a.key}-pct-label`).textContent=pct+'%';
  const amtEl=$(`${a.key}-amount`), nx=fmtNoCur(amt);
  if(amtEl.textContent!==nx){ amtEl.textContent=nx; pop(amtEl); }
  const pi=$(`${a.key}-pct-input`); if(document.activeElement!==pi) pi.value=pct;
  const sl=$(`${a.key}-slider`); sl.style.setProperty('--slider-fill',pct+'%'); sl.value=pct;
  if(a.goal){ const g=$(`${a.key}-goal`); const met=a.goal.type==='max'?pct<=a.goal.v:pct>=a.goal.v;
    g.textContent=(met?'✓ ':'! ')+a.goal.text; g.className='goal '+(met?'ok':'miss'); }
}
function renderAll(){
  const income=currentIncome(), f=fmt(income);
  const td=$('total-display'); if(td.textContent!==f){ td.textContent=f; pop(td); }
  const sum=KEYS.reduce((s,k)=>s+percents[k],0);
  const b=$('total-pct-badge'); b.textContent=Math.round(sum)+'%'; b.className='pct-badge'+(sum>100.01?' over':sum<99.99?' under':'');
  ACCOUNTS.forEach(a=>updateRow(a,income));
  ACCOUNTS.forEach(a=>{ const s=$('alloc-bar').querySelector(`[data-key="${a.key}"]`); if(s) s.style.width=percents[a.key]+'%'; });
}
function bindCalc(){
  ACCOUNTS.forEach(a=>{
    const sl=$(`${a.key}-slider`), ni=$(`${a.key}-pct-input`);
    sl.addEventListener('input',()=>{ setPercent(a.key,+sl.value); renderAll(); hideStampIfDirty(); });
    const apply=()=>{ let v=parseInt(ni.value,10); if(isNaN(v)) v=percents[a.key]; setPercent(a.key,v); renderAll(); hideStampIfDirty(); };
    ni.addEventListener('change',apply);
    ni.addEventListener('keydown',e=>{ if(e.key==='Enter'){ apply(); ni.blur(); } });
  });
  incomeInput.addEventListener('input',()=>{ renderAll(); hideStampIfDirty(); });
  incomeInput.addEventListener('keydown',e=>{ if(e.key==='Enter') incomeInput.blur(); });
  $('btn-reset').addEventListener('click',()=>{ ACCOUNTS.forEach(a=>percents[a.key]=a.percent); incomeInput.value=''; renderAll(); hideStamp(); incomeInput.focus(); });
  $('btn-save').addEventListener('click',saveThisMonth);
  $('month-input').addEventListener('change',()=>{ updateReceiptNo(); hideStampIfDirty(); checkStampForMonth(); });
}

function updateReceiptNo(){
  const m=$('month-input').value||curMonth();
  $('receipt-no').textContent=m;
  $('stamp-date').textContent=m.replace('-','·');
}
function showStamp(){ $('stamp').classList.remove('hidden'); }
function hideStamp(){ $('stamp').classList.add('hidden'); }
function hideStampIfDirty(){
  const m=$('month-input').value||curMonth(); const rec=records[m];
  if(!rec){ hideStamp(); return; }
  if(rec.income!==currentIncome()){ hideStamp(); return; }
  for(const k of KEYS) if(rec.percents[k]!==percents[k]){ hideStamp(); return; }
  showStamp();
}
function checkStampForMonth(){
  const m=$('month-input').value||curMonth(); const rec=records[m];
  if(rec) hideStampIfDirty(); else hideStamp();
}

/* 記帳 */
const LS_KEY='income-allocator:v1';
let records={};
function loadRecords(){ try{ records=JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch{ records={}; } }
function saveRecords(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(records)); }catch(e){ showToast('儲存失敗，請確認瀏覽器允許本機儲存'); } }
function curMonth(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function monthLabel(m){ const [y,mm]=m.split('-'); return `${y} 年 ${parseInt(mm,10)} 月`; }
let selectedMonth=null;

function saveThisMonth(){
  const income=currentIncome();
  if(income<=0){ showToast('請先輸入本月收入金額'); incomeInput.focus(); return; }
  const m=$('month-input').value||curMonth();
  if(records[m]){
    if(!confirm(`${monthLabel(m)} 已有分配單。\n要用目前的收入與比例更新嗎？（已記錄的花費會保留）`)) return;
    records[m].income=income; records[m].percents={...percents};
  } else { records[m]={ income, percents:{...percents}, createdAt:Date.now(), expenses:{} }; }
  saveRecords(); showToast(`已儲存 ${monthLabel(m)}`); showStamp();
}
function budgetOf(rec,k){ return Math.round(rec.income*rec.percents[k]/100); }
function spentOf(rec,k){ return (rec.expenses[k]||[]).reduce((s,e)=>s+e.amt,0); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function dateStr(ts){ const d=new Date(ts); return String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0'); }

/* ── 匯出 PNG ── */
function triggerDownload(url,filename){ const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); }
function teethPath(w){ let d='M0 0 ',tw=10; for(let x=0;x<w;x+=tw){ d+='L'+(x+tw/2)+' 7 L'+(x+tw)+' 0 '; } return d+'L'+w+' 0 Z'; }
/* 列印吐紙動畫：收據自出紙口吐出、往下掉，結束時自動下載 PNG */
function playEjectAndDownload(dataUrl,filename){
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce){ triggerDownload(dataUrl,filename); showToast('已匯出 PNG'); return; }
  const PW=Math.min(360,Math.round(window.innerWidth*0.84));
  const MW=PW+16;
  const ov=document.createElement('div'); ov.className='print-overlay';
  ov.innerHTML='<div class="po-stage" style="width:'+MW+'px">'
    +'<div class="po-printer"><span class="po-led"></span><span class="po-slit"></span><span class="po-tag">THERMAL</span></div>'
    +'<svg class="po-teeth" width="'+MW+'" height="7" viewBox="0 0 '+MW+' 7" preserveAspectRatio="none"><path fill="#3a352c" d="'+teethPath(MW)+'"/></svg>'
    +'<div class="po-feed"><div class="po-head"></div><div class="po-paper" style="width:'+PW+'px"><img class="po-img" alt="" style="width:'+PW+'px" /></div></div>'
    +'</div>';
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('show'));
  const img=ov.querySelector('.po-img');
  const feed=ov.querySelector('.po-feed');
  const led=ov.querySelector('.po-led');
  let done=false;
  function close(){ ov.classList.remove('show'); setTimeout(()=>{ if(ov.parentNode) ov.remove(); },320); }
  function finish(){ if(done) return; done=true; led.classList.remove('busy'); triggerDownload(dataUrl,filename); showToast('已匯出 PNG'); setTimeout(close,850); }
  img.onload=function(){
    const imgH=Math.round(PW*img.naturalHeight/img.naturalWidth);
    const full=Math.min(imgH,Math.round(window.innerHeight*0.72));
    led.classList.add('busy');
    feed.style.height='0px';
    const dur=1500; let start=null;
    function frame(now){
      if(!start) start=now;
      const t=Math.min(1,(now-start)/dur);
      const grip=t<0.13?(t/0.13)*0.06:0.06+(1-Math.pow(1-(t-0.13)/0.87,3))*0.94;
      feed.style.height=(full*grip)+'px';
      const amp=1.6*(1-t)+0.3;
      img.style.transform='translateX('+((Math.random()-0.5)*amp).toFixed(2)+'px)';
      if(t<1){ requestAnimationFrame(frame); }
      else { feed.style.height=full+'px'; img.style.transform='translateX(0)'; finish(); }
    }
    requestAnimationFrame(frame);
  };
  img.onerror=function(){ finish(); };
  img.src=dataUrl;
  ov.addEventListener('click',close);
}

function exportMonthAsPNG(month){
  const btn=$('btn-export'); if(btn) btn.disabled=true;
  showToast('產生中…');
  // 用 requestAnimationFrame 確保 UI 更新後再開始重繪(避免 UI 卡住)
  requestAnimationFrame(()=>setTimeout(()=>{
    try {
      const url = drawReceiptPNG(month);
      playEjectAndDownload(url, `心理帳戶_消費明細_${month}.png`);
    } catch(err){
      console.error(err);
      showToast('匯出失敗：'+err.message);
    } finally {
      if(btn) btn.disabled=false;
    }
  },50));
}

function drawReceiptPNG(month){
  const rec=records[month];
  if(!rec) throw new Error('找不到該月份資料');

  // 色票(對齊 App)
  const C={ desk:'#e7e1d6', paper:'#fbf8f1', ink:'#2b2620', soft:'#7c7361', faint:'#a89e89',
            dash:'#cfc6b2', acc:'#2f6a4f', warn:'#a8651e', bad:'#e0492f' };
  const F=`-apple-system, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif`;
  const M=`"SFMono-Regular", Menlo, Consolas, "Courier New", monospace`;

  // 解析度:2× retina,寬 720
  const W=720, scale=2;
  const PAD=44, INNER=40;
  const totalSpent=KEYS.reduce((s,k)=>s+spentOf(rec,k),0);
  const remain=rec.income-totalSpent;

  // 第一階段:量測高度
  // 為簡化,先用一個 dummy canvas 量測
  const measureC=document.createElement('canvas');
  const m=measureC.getContext('2d');
  m.font=`14px ${F}`;
  // 預估高度
  let H=30 /*上鋸齒留白*/ + 30 /*抬頭 padding*/ + 38 /*抬頭*/ + 24 /*副標*/ + 36 /*虛線*/
       + 64 /*收入大字*/ + 36 /*虛線*/ + 60 /*摘要*/ + 30 /*虛線*/;
  for(const a of ACCOUNTS){
    const items=rec.expenses[a.key]||[];
    H += 22 /*區塊頂 padding*/ + 22 /*標題*/ + 16 /*間*/;
    if(items.length){
      H += items.length*26 + 8;
    } else {
      H += 30;
    }
    H += 16 /*分隔*/ + 22 /*小計*/ + 22 /*剩餘*/ + 22 /*區塊底虛線*/;
  }
  H += 32 + 30 /*合計*/ + 60 /*條碼*/ + 28 /*條碼字*/ + 40 /*下鋸齒留白*/;

  // 建立 canvas
  const c=document.createElement('canvas');
  c.width=W*scale; c.height=H*scale;
  const ctx=c.getContext('2d');
  ctx.scale(scale,scale);
  ctx.textBaseline='alphabetic';
  // 桌面背景
  ctx.fillStyle=C.desk; ctx.fillRect(0,0,W,H);

  // 收據紙
  const pX=PAD, pY=20, pW=W-PAD*2, pH=H-40;
  // 陰影
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.18)'; ctx.shadowBlur=18; ctx.shadowOffsetY=8;
  ctx.fillStyle=C.paper; ctx.fillRect(pX,pY,pW,pH);
  ctx.restore();
  // 鋸齒(上下)
  const tw=12, th=7;
  ctx.fillStyle=C.desk;
  ctx.beginPath();
  for(let x=pX;x<pX+pW;x+=tw){
    ctx.moveTo(x,pY); ctx.lineTo(x+tw/2,pY+th); ctx.lineTo(x+tw,pY);
  }
  ctx.fill();
  ctx.beginPath();
  for(let x=pX;x<pX+pW;x+=tw){
    ctx.moveTo(x,pY+pH); ctx.lineTo(x+tw/2,pY+pH-th); ctx.lineTo(x+tw,pY+pH);
  }
  ctx.fill();

  const xL=pX+INNER, xR=pX+pW-INNER, cx=pX+pW/2;
  let y=pY+50;

  // 抬頭
  ctx.fillStyle=C.ink;
  ctx.font=`800 26px ${F}`;
  ctx.textAlign='center';
  // letter-spacing 用手動繪
  drawSpacedText(ctx,'心 理 帳 戶 計 算 機',cx,y,6);
  y+=22;
  ctx.fillStyle=C.faint;
  ctx.font=`13px ${M}`;
  drawSpacedText(ctx,`NO. ${month}　·　消費明細`,cx,y,2);
  y+=18;
  drawDashedLine(ctx,xL,y,xR,y,C.dash,2,6,6);
  y+=30;

  // 收入大字
  ctx.fillStyle=C.soft;
  ctx.font=`700 15px ${F}`;
  ctx.textAlign='left';
  ctx.fillText('每月收入',xL,y+8);
  ctx.fillStyle=C.ink;
  ctx.font=`800 34px ${M}`;
  ctx.textAlign='right';
  ctx.fillText(`NT$ ${rec.income.toLocaleString('zh-TW')}`,xR,y+14);
  y+=50;
  drawDashedLine(ctx,xL,y,xR,y,C.dash,2,6,6);
  y+=22;

  // 摘要三欄
  const colW=(xR-xL)/3;
  ctx.font=`11px ${M}`;
  ctx.textAlign='center';
  function sumCell(idx,label,val,color){
    const x=xL+colW*idx+colW/2;
    ctx.fillStyle=C.soft;
    ctx.font=`11px ${M}`;
    drawSpacedText(ctx,label,x,y,3);
    ctx.fillStyle=color;
    ctx.font=`800 20px ${M}`;
    ctx.fillText(val,x,y+24);
  }
  sumCell(0,'INCOME', rec.income.toLocaleString('zh-TW'), C.ink);
  sumCell(1,'SPENT', totalSpent.toLocaleString('zh-TW'), C.warn);
  sumCell(2, remain>=0?'LEFT':'OVER',
    (remain>=0?'':'-')+Math.abs(remain).toLocaleString('zh-TW'),
    remain>=0?C.acc:C.bad);
  y+=44;
  drawDashedLine(ctx,xL,y,xR,y,C.dash,2,6,6);
  y+=18;

  // 各帳戶區塊
  ACCOUNTS.forEach((a,i)=>{
    const items=rec.expenses[a.key]||[];
    const budget=budgetOf(rec,a.key);
    const spent=spentOf(rec,a.key);
    const rmn=budget-spent;
    const over=rmn<0;
    y+=20;
    // 標題:NN 名稱 + 預算
    ctx.fillStyle=C.ink;
    ctx.font=`800 15px ${F}`;
    ctx.textAlign='left';
    ctx.fillText(`${String(i+1).padStart(2,'0')}　${a.name}`,xL,y);
    ctx.fillStyle=C.soft;
    ctx.font=`700 13px ${M}`;
    ctx.textAlign='right';
    ctx.fillText(`預算 ${budget.toLocaleString('zh-TW')}　${rec.percents[a.key]}%`,xR,y);
    y+=16;
    // 花費明細
    if(items.length){
      ctx.font=`13px ${M}`;
      ctx.textAlign='left';
      items.forEach(e=>{
        ctx.fillStyle=C.faint;
        ctx.fillText(e.date||'--/--', xL, y+16);
        ctx.fillStyle=C.ink;
        ctx.font=`14px ${F}`;
        // 截斷過長品項
        const maxNameW = xR-xL-58-80;
        let name=e.name||'未命名';
        let w=ctx.measureText(name).width;
        if(w>maxNameW){
          while(name.length>1 && ctx.measureText(name+'…').width>maxNameW){ name=name.slice(0,-1); }
          name+='…';
        }
        ctx.fillText(name, xL+58, y+16);
        ctx.font=`700 14px ${M}`;
        ctx.textAlign='right';
        ctx.fillText(e.amt.toLocaleString('zh-TW'), xR, y+16);
        ctx.textAlign='left';
        ctx.font=`13px ${M}`;
        y+=22;
      });
      y+=4;
    } else {
      ctx.fillStyle=C.faint;
      ctx.font=`12px ${M}`;
      ctx.textAlign='center';
      drawSpacedText(ctx,'— 尚無花費 —',cx,y+18,3);
      y+=26;
    }
    // 小計列
    drawDashedLine(ctx, xL+colW, y+6, xR, y+6, C.faint, 1, 3, 3);
    y+=22;
    ctx.fillStyle=C.soft;
    ctx.font=`12px ${M}`;
    ctx.textAlign='right';
    drawSpacedText(ctx,'小計',xR-110,y,2);
    ctx.fillStyle=C.ink;
    ctx.font=`800 13px ${M}`;
    ctx.fillText(spent.toLocaleString('zh-TW'), xR, y);
    y+=18;
    ctx.fillStyle=C.soft;
    ctx.font=`12px ${M}`;
    drawSpacedText(ctx, over?'超支':'剩餘', xR-110, y, 2);
    ctx.fillStyle=over?C.bad:C.acc;
    ctx.font=`800 13px ${M}`;
    const rmnTxt = over?`-${Math.abs(rmn).toLocaleString('zh-TW')}`:rmn.toLocaleString('zh-TW');
    ctx.fillText(rmnTxt, xR, y);
    y+=18;
    // 區塊間虛線
    if(i<ACCOUNTS.length-1) drawDashedLine(ctx,xL,y+6,xR,y+6,C.dash,2,6,6);
    y+=16;
  });

  // 合計
  y+=16;
  ctx.fillStyle=C.ink;
  ctx.font=`800 18px ${F}`;
  ctx.textAlign='left';
  drawSpacedText(ctx,'合 計', xL, y, 4);
  ctx.textAlign='right';
  ctx.font=`800 17px ${M}`;
  ctx.fillText(`NT$ ${totalSpent.toLocaleString('zh-TW')} / NT$ ${rec.income.toLocaleString('zh-TW')}`, xR, y);
  y+=30;
  // 條碼
  ctx.fillStyle=C.ink;
  ctx.font=`28px ${M}`;
  ctx.textAlign='center';
  ctx.fillText('|‖|‖||‖|‖‖||‖|‖||‖|‖‖|‖||‖|‖|', cx, y+28);
  y+=44;
  ctx.fillStyle=C.faint;
  ctx.font=`11px ${M}`;
  drawSpacedText(ctx, `${month}　THANK YOU FOR SHOPPING`, cx, y, 4);

  // 輸出
  return c.toDataURL('image/png');
}

function drawSpacedText(ctx,text,x,y,letterSpacing){
  // 手動實作 letter-spacing(瀏覽器 Canvas 沒原生支援)
  if(!letterSpacing){ ctx.fillText(text,x,y); return; }
  const align=ctx.textAlign;
  // 量總寬,以便對齊
  let totalW=0;
  const chars=[...text];
  const widths=chars.map(ch=>ctx.measureText(ch).width);
  totalW = widths.reduce((s,w)=>s+w,0) + letterSpacing*(chars.length-1);
  let curX;
  if(align==='center') curX=x-totalW/2;
  else if(align==='right') curX=x-totalW;
  else curX=x;
  const saveAlign=ctx.textAlign;
  ctx.textAlign='left';
  for(let i=0;i<chars.length;i++){
    ctx.fillText(chars[i], curX, y);
    curX += widths[i] + letterSpacing;
  }
  ctx.textAlign=saveAlign;
}

function drawDashedLine(ctx,x1,y1,x2,y2,color,width,dash,gap){
  ctx.save();
  ctx.strokeStyle=color;
  ctx.lineWidth=width;
  ctx.setLineDash([dash,gap]);
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.restore();
}

function renderRecords(){
  const view=$('view-records');
  const months=Object.keys(records).sort().reverse();
  if(months.length===0){
    view.innerHTML=`<article class="receipt"><div class="empty-state">
      <div class="es-ic"><svg class="ic"><use href="#i-list"/></svg></div>
      <p>還沒有任何消費明細。<br>先到「分配單」輸入本月收入、調好比例，按 SAVE 即可建立。</p>
      <button class="btn-primary" style="max-width:none;margin:auto" id="es-go">[ 前往分配單 ]</button></div></article>`;
    $('es-go').addEventListener('click',()=>switchTab('calc')); return;
  }
  if(!selectedMonth||!records[selectedMonth]) selectedMonth=months[0];
  const rec=records[selectedMonth];
  const totalSpent=KEYS.reduce((s,k)=>s+spentOf(rec,k),0), remain=rec.income-totalSpent;
  const opts=months.map(m=>`<option value="${m}" ${m===selectedMonth?'selected':''}>${m}</option>`).join('');

  const blocks=ACCOUNTS.map((a,i)=>{
    const budget=budgetOf(rec,a.key), spent=spentOf(rec,a.key), rem=budget-spent, over=rem<0;
    const list=(rec.expenses[a.key]||[]);
    const items=list.length?list.map(e=>`<li class="expense-row" data-id="${e.id}">
      <span class="ed">${e.date||'--/--'}</span>
      <span class="en">${escapeHtml(e.name)}</span>
      <span class="ea">${fmtNoCur(e.amt)}</span>
      <button class="del" data-key="${a.key}" data-id="${e.id}" aria-label="刪除">×</button></li>`).join('')
      :`<li class="expense-empty">— 尚無花費 —</li>`;
    const customExtras = (rec.customNotes && rec.customNotes[a.key]) || [];
    const allNotes = (a.notes||[]).concat(customExtras);
    const noteTags = allNotes.length
      ? `<div class="note-tags">${allNotes.map((n,idx)=>{
          const isCustom = idx >= (a.notes||[]).length;
          return `<span class="note-tag${isCustom?' custom':''}" data-key="${a.key}" data-idx="${idx}">${escapeHtml(n)}${isCustom?'<button class="note-del" data-key="'+a.key+'" data-idx="'+idx+'" aria-label="刪除">×</button>':''}</span>`;
        }).join('')}${a.custom?`<button class="note-add" data-key="${a.key}" aria-label="新增備註">+ 自訂</button>`:''}</div>`
      : '';
    return `<div class="ledger-block" data-key="${a.key}">
      <div class="lb-head"><span class="name"><span class="dot" style="background:${a.hex}"></span>${String(i+1).padStart(2,'0')}　${a.name}</span><span class="dotleader"></span><span class="budget">預算 ${fmtNoCur(budget)}　${rec.percents[a.key]}%</span></div>
      ${noteTags}
      <ul class="expense-list">${items}</ul>
      <div class="subtotal"><span class="lbl">小計</span><span class="val">${fmtNoCur(spent)}</span></div>
      <div class="subtotal remain ${over?'neg':''}"><span class="lbl">${over?'超支':'剩餘'}</span><span class="val">${over?'-'+fmtNoCur(-rem):fmtNoCur(rem)}</span></div>
      <div class="expense-form">
        <input class="exp-name" type="text" placeholder="品項，例如：午餐" data-key="${a.key}" maxlength="30" />
        <input class="exp-amt" type="number" placeholder="金額" min="0" step="1" inputmode="numeric" data-key="${a.key}" />
        <button class="exp-add" data-key="${a.key}" aria-label="新增">+</button>
      </div></div>`;
  }).join('');

  view.innerHTML=`<article class="receipt">
    <header class="r-head">
      <div class="r-title">消　費　明　細</div>
      <div class="r-sub">NO. <b>${selectedMonth}</b>　·　${monthLabel(selectedMonth)}</div>
    </header>
    <div class="records-head">
      <label for="month-select">MONTH</label>
      <select id="month-select">${opts}</select>
      <button class="btn-ghost" id="btn-export"><svg class="ic"><use href="#i-export"/></svg> EXPORT</button>
      <button class="btn-danger" id="btn-del-month">DELETE</button>
    </div>
    <div class="summary">
      <div class="cell"><div class="lbl">INCOME</div><div class="val">${fmtNoCur(rec.income)}</div></div>
      <div class="cell spent"><div class="lbl">SPENT</div><div class="val">${fmtNoCur(totalSpent)}</div></div>
      <div class="cell remain ${remain<0?'neg':''}"><div class="lbl">${remain<0?'OVER':'LEFT'}</div><div class="val">${remain<0?'-'+fmtNoCur(-remain):fmtNoCur(remain)}</div></div>
    </div>
    ${blocks}
    <div class="divider"></div>
    <div class="total-line"><span class="lbl">合計</span><span class="val">${fmt(totalSpent)} / ${fmt(rec.income)}</span></div>
    <div class="barcode"><div class="bars">|‖|‖||‖|‖‖||‖|‖||‖|‖‖|‖||‖|‖|</div><div class="cap">${selectedMonth}　THANK YOU FOR SHOPPING</div></div>
  </article>`;

  $('month-select').addEventListener('change',e=>{ selectedMonth=e.target.value; renderRecords(); });
  $('btn-del-month').addEventListener('click',()=>{ if(confirm(`確定刪除 ${monthLabel(selectedMonth)} 的整張明細嗎？無法復原。`)){ delete records[selectedMonth]; selectedMonth=null; saveRecords(); renderRecords(); showToast('已刪除'); } });
  $('btn-export').addEventListener('click',()=>exportMonthAsPNG(selectedMonth));
  bindLedger(view);
}
function bindLedger(view){
  const doAdd=key=>{
    const block=view.querySelector(`.ledger-block[data-key="${key}"]`);
    const nameEl=block.querySelector('.exp-name'), amtEl=block.querySelector('.exp-amt');
    const amt=Math.round(parseFloat(amtEl.value));
    if(!(amt>0)){ showToast('請輸入大於 0 的金額'); amtEl.focus(); return; }
    const rec=records[selectedMonth];
    (rec.expenses[key]=rec.expenses[key]||[]).push({ id:Date.now().toString(36)+Math.random().toString(36).slice(2,6), date:dateStr(Date.now()), name:(nameEl.value||'').trim()||'未命名', amt });
    saveRecords(); renderRecords();
    const nc=view.querySelector(`.ledger-block[data-key="${key}"] .exp-name`); if(nc) nc.focus();
  };
  view.querySelectorAll('.exp-add').forEach(b=>b.addEventListener('click',()=>doAdd(b.dataset.key)));
  view.querySelectorAll('.exp-amt,.exp-name').forEach(inp=>inp.addEventListener('keydown',e=>{ if(e.key==='Enter') doAdd(inp.dataset.key); }));
  view.querySelectorAll('.expense-row .del').forEach(b=>b.addEventListener('click',()=>{ const {key,id}=b.dataset; const rec=records[selectedMonth]; rec.expenses[key]=(rec.expenses[key]||[]).filter(e=>String(e.id)!==String(id)); saveRecords(); renderRecords(); }));
  // 點備註標籤 → 帶入花費表單的品項欄
  view.querySelectorAll('.note-tag').forEach(t=>t.addEventListener('click',e=>{
    if(e.target.classList.contains('note-del')) return;
    const key=t.dataset.key;
    const block=view.querySelector(`.ledger-block[data-key="${key}"]`);
    const nameEl=block.querySelector('.exp-name');
    // 用標籤文字(去掉 emoji 與空白)當品項
    const raw=t.childNodes[0].textContent.trim();
    nameEl.value=raw;
    block.querySelector('.exp-amt').focus();
  }));
  // 新增自訂備註
  view.querySelectorAll('.note-add').forEach(b=>b.addEventListener('click',()=>{
    const key=b.dataset.key;
    const txt=prompt('新增自訂備註（可加 emoji 開頭，例如：✈️ 京都自由行）');
    if(!txt||!txt.trim()) return;
    const rec=records[selectedMonth];
    rec.customNotes=rec.customNotes||{};
    rec.customNotes[key]=rec.customNotes[key]||[];
    rec.customNotes[key].push(txt.trim());
    saveRecords(); renderRecords();
  }));
  // 刪除自訂備註
  view.querySelectorAll('.note-del').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const {key,idx}=b.dataset;
    const rec=records[selectedMonth];
    const builtinLen=(ACCOUNTS.find(a=>a.key===key).notes||[]).length;
    const customIdx=Number(idx)-builtinLen;
    if(rec.customNotes && rec.customNotes[key] && customIdx>=0){
      rec.customNotes[key].splice(customIdx,1);
      saveRecords(); renderRecords();
    }
  }));
}

function switchTab(which){
  const calc=which==='calc';
  $('tab-calc').classList.toggle('active',calc); $('tab-records').classList.toggle('active',!calc);
  $('view-calc').classList.toggle('active',calc); $('view-records').classList.toggle('active',!calc);
  if(!calc) renderRecords();
  window.scrollTo({top:0,behavior:'smooth'});
}
let toastTimer;
function showToast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2400); }

function setupPWA(){
  if('serviceWorker' in navigator){
    window.addEventListener('load', async () => {
      try {
        const reg = await navigator.serviceWorker.register('sw.js');
        // 偵測有新版安裝
        let firstController = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          // 首次安裝(沒有舊 controller)時不 reload,只有「升級」時才 reload
          if(!firstController) return;
          showUpdateBanner();
          // 短暫提示後自動 reload
          setTimeout(() => window.location.reload(), 1400);
        });
        // 每次頁面取得焦點時主動檢查更新
        const checkUpdate = () => reg.update().catch(()=>{});
        window.addEventListener('focus', checkUpdate);
        document.addEventListener('visibilitychange', () => { if(!document.hidden) checkUpdate(); });
      } catch(_){}
    });
  }
  const btn=$('install-btn'), tip=$('install-tip');
  const standalone=(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||window.navigator.standalone===true;
  if(standalone) return;
  let deferred=null;
  window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferred=e; btn.classList.add('show'); });
  const isSafari=/^((?!chrome|android|crios|edg).)*safari/i.test(navigator.userAgent);
  btn.addEventListener('click',async()=>{
    if(deferred){ deferred.prompt(); await deferred.userChoice; deferred=null; btn.classList.remove('show'); }
    else { tip.innerHTML=isSafari?'Safari：上方選單「<b>檔案 → 加入 Dock…</b>」（macOS 14+）即可像 App 開啟。':'在 Chrome / Edge 網址列右側點「<b>安裝</b>」圖示即可。'; tip.classList.toggle('show'); }
  });
  if(isSafari) btn.classList.add('show');
}

function showUpdateBanner(){
  if(document.getElementById('update-banner')) return;
  const b=document.createElement('div');
  b.id='update-banner';
  b.className='update-banner show';
  b.innerHTML='<span class="dot-spin"></span><span>有新版本，正在套用…</span>';
  document.body.appendChild(b);
}

(function init(){
  loadRecords();
  buildRows(); buildAllocBar(); bindCalc();
  $('month-input').value=curMonth();
  updateReceiptNo();
  renderAll();
  checkStampForMonth();
  $('tab-calc').addEventListener('click',()=>switchTab('calc'));
  $('tab-records').addEventListener('click',()=>switchTab('records'));
  setupPWA();
})();
</script>
